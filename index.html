<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; max-width: 500px; }
        
       
        form p { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="email"], input[type="tel"] { 
            width: 100%; padding: 10px; border: 1px solid #767676; border-radius: 4px; 
        }
        button { 
            padding: 12px 24px; background-color: #0056b3; color: white; 
            border: none; border-radius: 4px; font-weight: bold; cursor: pointer;
        }
        button:focus { outline: 3px solid #ff8c00; }
        fieldset { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <main>
        <header>
            <h1>Cadastro de Clientes</h1>
            <p>Os campos marcados com <strong>*</strong> são de preenchimento obrigatório.</p>
        </header>

        <form action="#" method="post">
            <p>
                <label for="nome">Nome Completo *</label>
                <input type="text" id="nome" name="nome" required aria-required="true">
            </p>

            <p>
                <label for="email">E-mail *</label>
                <input type="email" id="email" name="email" required aria-required="true" aria-describedby="dica-email">
                <small id="dica-email">Exemplo: nome@empresa.com.br</small>
            </p>

            <fieldset>
                <legend>Preferências de Contato</legend>
                <p>
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter" style="display: inline;">Aceito receber novidades por e-mail</label>
                </p>
            </fieldset>

            <footer>
                <button type="submit" aria-label="Finalizar e enviar cadastro">Enviar Dados</button>
            </footer>
        </form>
    </main>

</body>
</html>
