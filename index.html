<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes - Completo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <header>
            <h1>Cadastro de Clientes</h1>
            <p>Os campos com <strong>*</strong> são obrigatórios.</p>
        </header>

        <form action="#" method="post">
            <fieldset>
                <legend>Dados Pessoais</legend>
                
                <p>
                    <label for="nome">Nome Completo *</label>
                    <input type="text" id="nome" name="nome" required aria-required="true">
                </p>

                <p>
                    <label for="cpf">CPF *</label>
                    <input type="text" id="cpf" name="cpf" required aria-required="true" placeholder="000.000.000-00">
                </p>

                <p>
                    <label for="nascimento">Data de Nascimento</label>
                    <input type="date" id="nascimento" name="nascimento">
                </p>

                <p>
                    <label for="genero">Gênero</label>
                    <select id="genero" name="genero">
                        <option value="">Selecione...</option>
                        <option value="feminino">Feminino</option>
                        <option value="masculino">Masculino</option>
                        <option value="outro">Outro / Não informar</option>
                    </select>
                </p>
            </fieldset>

            <fieldset>
                <legend>Informações de Contato</legend>
                <p>
                    <label for="email">E-mail Corporativo *</label>
                    <input type="email" id="email" name="email" required aria-required="true" aria-describedby="dica-email">
                    <small id="dica-email">Exemplo: nome@empresa.com.br</small>
                </p>

                <p>
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter" style="display: inline;">Aceito receber novidades</label>
                </p>
            </fieldset>

            <footer>
                <button type="submit" aria-label="Finalizar e enviar cadastro">Enviar Dados</button>
            </footer>
        </form>
    </main>

</body>
</html>
